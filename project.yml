name: Tempo
options:
  bundleIdPrefix: com.fabianobattaglin
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  Tempo:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tempo
        excludes:
          - "Resources/Info.plist"
          - "logo/**"
    info:
      path: Tempo/Resources/Info.plist
      properties:
        CFBundleDisplayName: Tempo
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: NO
        LSApplicationCategoryType: public.app-category.music
        NSHumanReadableCopyright: "Copyright © 2026 Fabiano Battaglin"
        NSMainStoryboardFile: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fabianobattaglin.Tempo
        PRODUCT_NAME: Tempo
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_APP_SANDBOX: NO
  TempoTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: TempoTests
    dependencies:
      - target: Tempo
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.fabianobattaglin.TempoTests

schemes:
  Tempo:
    build:
      targets:
        Tempo: all
        TempoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TempoTests
    archive:
      config: Release
